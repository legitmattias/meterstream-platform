---
# Load Terraform outputs and build dynamic inventory
- name: Load Terraform outputs and build dynamic inventory
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Ensure Terraform outputs are available
      command: terraform output -json
      args:
        chdir: "{{ playbook_dir }}/../infra"
      register: tf_outputs
      changed_when: false
      failed_when: tf_outputs.rc != 0

    - name: Parse cluster IPs from Terraform outputs
      set_fact:
        cluster_ips: "{{ (tf_outputs.stdout | from_json).cluster_ips }}"

    - name: Show discovered cluster IPs (debug)
      debug:
        var: cluster_ips

    - name: Add hosts from Terraform outputs into inventory
      add_host:
        name: "{{ item.key }}"
        ansible_host: "{{ item.value }}"
        ansible_user: ubuntu
        groups: k3s_server
      loop: "{{ cluster_ips | dict2items }}"

- name: Deploy k3s server
  hosts: k3s_server
  tags: deploy
  become: yes
  gather_facts: no
  vars:
    ansible_python_interpreter: /usr/bin/python3
  pre_tasks:
    - name: Wait for SSH connection
      wait_for_connection:
        timeout: 300
    - name: Gather facts
      setup:
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - ca-certificates
          - apt-transport-https
        state: present
        update_cache: yes

    - name: Download k3s install script (idempotent)
      shell: |
        curl -fsSL https://get.k3s.io -o /tmp/get_k3s.sh
      args:
        creates: /tmp/get_k3s.sh

    - name: Ensure k3s install script is executable
      file:
        path: /tmp/get_k3s.sh
        mode: '0755'
        owner: root
        group: root

    - name: Install k3s server
      shell: |
        /tmp/get_k3s.sh server --write-kubeconfig-mode 644 --tls-san {{ ansible_host }}
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s service to be active
      systemd:
        name: k3s
        state: started
      register: k3s_service
      until: k3s_service.status.ActiveState == "active"
      retries: 30
      delay: 10

    - name: Wait for kubectl to be available
      command: kubectl get nodes --kubeconfig /etc/rancher/k3s/k3s.yaml
      register: kubectl_check
      until: kubectl_check.rc == 0
      retries: 30
      delay: 5

    - name: Copy kubeconfig to ubuntu home
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/kubeconfig.yaml
        owner: ubuntu
        group: ubuntu
        mode: '0644'
        remote_src: yes

    - name: Fetch server CA certificate
      slurp:
        src: /var/lib/rancher/k3s/server/tls/server-ca.crt
      register: server_ca_cert
      ignore_errors: yes

    - name: Fetch client admin certificate
      slurp:
        src: /var/lib/rancher/k3s/server/tls/client-admin.crt
      register: client_admin_cert
      ignore_errors: yes

    - name: Fetch client admin key
      slurp:
        src: /var/lib/rancher/k3s/server/tls/client-admin.key
      register: client_admin_key
      ignore_errors: yes

    - name: Generate external kubeconfig file (if certs available)
      copy:
        content: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              certificate-authority-data: "{{ server_ca_cert.content | default('') }}"
              server: https://{{ ansible_host }}:6443
            name: k3s
          contexts:
          - context:
              cluster: k3s
              user: admin
            name: k3s
          current-context: k3s
          users:
          - name: admin
            user:
              client-certificate-data: "{{ client_admin_cert.content | default('') }}"
              client-key-data: "{{ client_admin_key.content | default('') }}"
        dest: /home/ubuntu/kubeconfig-external.yaml
        owner: ubuntu
        group: ubuntu
        mode: '0644'
      when: server_ca_cert is defined and client_admin_cert is defined and client_admin_key is defined

    - name: Show deployment summary
      debug:
        msg: |
          k3s server deployed

- name: Join k3s agents
  hosts: k3s_agents
  tags: join
  become: yes
  gather_facts: no
  vars:
    ansible_python_interpreter: /usr/bin/python3
  pre_tasks:
    - name: Wait for SSH connection
      wait_for_connection:
        timeout: 300
    - name: Gather facts
      setup:
  tasks:
    - name: Install prerequisites
      apt:
        name:
          - curl
          - ca-certificates
        state: present
        update_cache: yes

    - name: Download k3s install script
      shell: |
        curl -fsSL https://get.k3s.io -o /tmp/get_k3s.sh
      args:
        creates: /tmp/get_k3s.sh

    - name: Ensure k3s install script is executable
      file:
        path: /tmp/get_k3s.sh
        mode: '0755'
        owner: root
        group: root

    - name: Fetch node token from server (delegated)
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token_raw
      delegate_to: "{{ groups['k3s_server'] | first }}"
      run_once: true

    - name: Decode node token
      set_fact:
        k3s_node_token: "{{ (node_token_raw.content | b64decode).splitlines()[0] }}"

    - name: Install k3s agent and join server
      shell: |
        /tmp/get_k3s.sh agent --server https://{{ hostvars[groups['k3s_server'] | first].ansible_host | default(hostvars[groups['k3s_server'] | first].ansible_default_ipv4.address) }}:6443 --token '{{ k3s_node_token }}'
      args:
        creates: /usr/local/bin/k3s
      # allow the installer to run asynchronously and let Ansible poll for completion
      async: 600
      poll: 10

    - name: Ensure k3s agent service is started
      systemd:
        name: k3s-agent
        state: started

    - name: Show node join summary
      debug:
        msg: "Node {{ inventory_hostname }} joined to k3s server"
  
- name: Install KEDA (Kubernetes Event Driven Autoscaling)
  hosts: k3s_server
  become: yes
  tags: keda
  vars:
    keda_version: "2.16.0"
  tasks:
    - name: Check if KEDA is already installed
      command: kubectl get namespace keda
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: keda_check
      ignore_errors: yes
      changed_when: false

    - name: Install KEDA
      command: >
        kubectl apply --server-side
        -f https://github.com/kedacore/keda/releases/download/v{{ keda_version }}/keda-{{ keda_version }}.yaml
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      when: keda_check.rc != 0

    - name: Wait for KEDA operator to be ready
      command: >
        kubectl wait --for=condition=ready pod
        -l app=keda-operator
        -n keda
        --timeout=300s
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      when: keda_check.rc != 0

    - name: Verify KEDA installation
      command: kubectl get pods -n keda
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      register: keda_pods
      changed_when: false

    - name: Show KEDA installation status
      debug:
        msg: "KEDA {{ keda_version }} installed successfully"
      when: keda_check.rc != 0

- name: Configure Traefik and NGINX
  hosts: k3s_server
  become: yes
  tags:
    - traefik
    - nginx
  tasks:
    # ============================================
    # Traefik Configuration (persistent via K3s)
    # ============================================
    - name: Configure Traefik via HelmChartConfig
      copy:
        dest: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
        content: |
          apiVersion: helm.cattle.io/v1
          kind: HelmChartConfig
          metadata:
            name: traefik
            namespace: kube-system
          spec:
            valuesContent: |-
              hostNetwork: false
              service:
                type: NodePort
              ports:
                web:
                  nodePort: 30080
                websecure:
                  nodePort: 30443
      notify: Wait for Traefik restart

    # ============================================
    # NGINX Reverse Proxy
    # ============================================
    - name: Install NGINX
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Remove default NGINX site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create Traefik reverse proxy config
      copy:
        dest: /etc/nginx/sites-available/traefik-proxy
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:30080;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;

                  # WebSocket support
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
              }
          }
      notify: Reload NGINX

    - name: Enable Traefik reverse proxy
      file:
        src: /etc/nginx/sites-available/traefik-proxy
        dest: /etc/nginx/sites-enabled/traefik-proxy
        state: link
      notify: Reload NGINX

  handlers:
    - name: Wait for Traefik restart
      pause:
        seconds: 30
      
    - name: Reload NGINX
      systemd:
        name: nginx
        state: reloaded