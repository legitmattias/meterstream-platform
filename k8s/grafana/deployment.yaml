#GF (Grafana) Ingen PVC eftersom dashboards provisioneras från ConfigMaps (stateless Grafana).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000

          env:
            # Är default-värden som används "out of the box", kan använda annat via secrets.
            #- name: GF_SECURITY_ADMIN_USER
            #  value: xxxxxx
            #- name: GF_SECURITY_ADMIN_PASSWORD
            #  value: xxxxxx

            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"

            - name: INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-init
                  key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN

          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources

            - name: providers
              mountPath: /etc/grafana/provisioning/dashboards

            - name: dashboards
              mountPath: /var/lib/grafana/dashboards

      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources

        - name: providers
          configMap:
            name: grafana-dashboard-providers

        - name: dashboards
          configMap:
            name: grafana-dashboards
