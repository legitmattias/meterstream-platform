                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 14,
            "w": 23,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "barRadius": 0.1,
            "barWidth": 0.97,
            "colorByField": "Value",
            "fullHighlight": false,
            "groupWidth": 0.7,
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom",
              "showLegend": false
            },
            "orientation": "auto",
            "showValue": "auto",
            "stacking": "none",
            "tooltip": {
              "mode": "single",
              "sort": "none"
            },
            "xTickLabelRotation": 0,
            "xTickLabelSpacing": 0
          },
          "targets": [
            {
              "datasource": {
                "type": "influxdb",
                "uid": "influxdb"
              },
              "query":"import \"timezone\"\r\nimport \"date\"\r\n\r\noption location = timezone.location(name: \"Europe/Stockholm\")\r\n\r\nintervalStr = \"1d\"\r\nstart = date.truncate(t: v.timeRangeStart, unit: 1d)\r\nstop  = date.truncate(t: v.timeRangeStop, unit: 1d)\r\n\r\nfrom(bucket: \"meterstream\")\r\n  |> range(start: start, stop: stop)\r\n  |> filter(fn: (r) => r._measurement == \"meter_readings\")\r\n  |> filter(fn: (r) => r._field == \"power_consumption\")\r\n  |> group(columns: [])\r\n  |> aggregateWindow(every: 1d, fn: sum, createEmpty: false, timeSrc: \"_start\")\r\n  |> yield(name: \"daily_sum\")\r\n",
              "refId": "A"
            }
          ],
          "title": "Monitor",
          "type": "barchart"
        }
      ],
      "refresh": "",
      "schemaVersion": 39,
      "tags": [],
      "templating": {
        "list": []
      },
      "time": {
        "from": "2023-12-01T00:00:00.000Z",
        "to": "2023-12-31T23:59:59.000Z"
      },
