#Talar om för Grafana var den ska hitta dashboards på filsystemet (som kommer från ConfigMap-mount).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
data:
  dashboards.yaml: | # | = multirad sträng
    apiVersion: 1
    providers:
      - name: meterstream
        orgId: 1
        folder: MeterStream
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
