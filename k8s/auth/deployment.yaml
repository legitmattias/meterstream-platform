apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app: auth
spec:
  replicas: 1 # one replica for now???
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: auth
          image: gitlab.lnu.se:5050/2dv013/student/team-2025-04-meterstream3/meterstream/auth:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: MONGODB_URL
              valueFrom:
                configMapKeyRef:
                  name: auth-config
                  key: mongodb_url
            - name: DATABASE_NAME
              value: "meterstream_auth"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: jwt_secret_key
            - name: JWT_ALGORITHM
              value: "HS256"
            - name: JWT_EXPIRE_MINUTES
              value: "60"
            - name: JWT_REFRESH_EXPIRE_DAYS
              value: "7"
            - name: SERVICE_NAME
              value: "auth-service"
            - name: DEBUG
              value: "false"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
