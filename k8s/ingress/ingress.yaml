apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meterstream-ingress
  namespace: meterstream
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          # Frontend - serves static HTML with HTTP 200
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # grafana
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000

      # TODO Week 3: Expose API Gateway for frontend login/API calls
      # Uncomment when:
      # 1. Gateway service is deployed and tested
      # 2. Frontend needs to make API calls to /api/auth/login etc.
      # 3. HTTPS is enabled (required for secure authentication)
      # Then uncomment lines below:
      # - path: /api
