apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meterstream-ingress
  namespace: meterstream
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          # Frontend - serves static HTML with HTTP 200
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          # grafana
          # - path: /grafana
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: grafana
          #       port:
          #         number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8000
