# ==============================================================================
# CQRS: InfluxDB Replication Setup Job
# ==============================================================================
# This job configures Edge Data Replication from the write instance to the
# read instance. Run this AFTER both influxdb and influxdb-read are ready.
#
# What it does:
# 1. Waits for both instances to be healthy
# 2. Creates a remote connection on write instance pointing to read instance
# 3. Creates a replication stream to sync the meterstream bucket
#
# Note: This job is idempotent - it checks for existing config before creating.
# ==============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: setup-influx-replication
spec:
  ttlSecondsAfterFinished: 300  # Clean up 5 minutes after completion
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: setup-replication
        image: influxdb:2.7
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e

            echo "=== InfluxDB Edge Data Replication Setup ==="
            echo ""

            # Wait for write instance to be ready
            echo "Waiting for write instance (influxdb:8086)..."
            until curl -sf http://influxdb:8086/health > /dev/null 2>&1; do
              echo "  Write instance not ready, waiting 5s..."
              sleep 5
            done
            echo "Write instance is healthy."

            # Wait for read instance to be ready
            echo "Waiting for read instance (influxdb-read:8086)..."
            until curl -sf http://influxdb-read:8086/health > /dev/null 2>&1; do
              echo "  Read instance not ready, waiting 5s..."
              sleep 5
            done
            echo "Read instance is healthy."
            echo ""

            # Check if replication already exists (table output: ID is first column)
            echo "Checking for existing replication configuration..."
            if influx replication list \
              --host http://influxdb:8086 \
              --token "$INFLUX_WRITE_TOKEN" \
              --org "$INFLUX_ORG" \
              --hide-headers 2>/dev/null | grep -q "meterstream-replication"; then
              echo "Replication 'meterstream-replication' already exists. Nothing to do."
              echo ""
              echo "Current replication status:"
              influx replication list \
                --host http://influxdb:8086 \
                --token "$INFLUX_WRITE_TOKEN" \
                --org "$INFLUX_ORG"
              exit 0
            fi
            echo "No existing replication found."

            # Get the remote organization ID (needed for remote connection)
            # Table output format: ID <tab> Name
            echo "Getting organization ID from read instance..."
            REMOTE_ORG_ID=$(influx org list \
              --host http://influxdb-read:8086 \
              --token "$INFLUX_READ_TOKEN" \
              --hide-headers | cut -f1)
            echo "Remote org ID: $REMOTE_ORG_ID"
            echo ""

            # Check if remote already exists and get its ID
            echo "Checking for existing remote configuration..."
            EXISTING_REMOTE=$(influx remote list \
              --host http://influxdb:8086 \
              --token "$INFLUX_WRITE_TOKEN" \
              --org "$INFLUX_ORG" \
              --hide-headers 2>/dev/null | grep "read-replica" || true)

            if [ -z "$EXISTING_REMOTE" ]; then
              echo "Creating remote connection to read instance..."
              REMOTE_ID=$(influx remote create \
                --host http://influxdb:8086 \
                --token "$INFLUX_WRITE_TOKEN" \
                --org "$INFLUX_ORG" \
                --name read-replica \
                --remote-url http://influxdb-read:8086 \
                --remote-api-token "$INFLUX_READ_TOKEN" \
                --remote-org-id "$REMOTE_ORG_ID" \
                --hide-headers | cut -f1)
              echo "Remote created with ID: $REMOTE_ID"
            else
              REMOTE_ID=$(echo "$EXISTING_REMOTE" | cut -f1)
              echo "Remote 'read-replica' already exists with ID: $REMOTE_ID"
            fi
            echo ""

            # Get the local bucket ID (table output: ID is first column)
            echo "Getting local bucket ID for '$INFLUX_BUCKET'..."
            BUCKET_ID=$(influx bucket list \
              --host http://influxdb:8086 \
              --token "$INFLUX_WRITE_TOKEN" \
              --org "$INFLUX_ORG" \
              --name "$INFLUX_BUCKET" \
              --hide-headers | cut -f1)
            echo "Bucket ID: $BUCKET_ID"
            echo ""

            # Create the replication stream
            echo "Creating replication stream..."
            influx replication create \
              --host http://influxdb:8086 \
              --token "$INFLUX_WRITE_TOKEN" \
              --org "$INFLUX_ORG" \
              --name meterstream-replication \
              --remote-id "$REMOTE_ID" \
              --local-bucket-id "$BUCKET_ID" \
              --remote-bucket "$INFLUX_BUCKET"

            echo ""
            echo "=== Replication Setup Complete ==="
            echo ""
            echo "Replication status:"
            influx replication list \
              --host http://influxdb:8086 \
              --token "$INFLUX_WRITE_TOKEN" \
              --org "$INFLUX_ORG"

        env:
        # Write instance credentials (from existing secret)
        - name: INFLUX_WRITE_TOKEN
          valueFrom:
            secretKeyRef:
              name: influxdb-init
              key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
        # Read instance credentials (from new secret)
        - name: INFLUX_READ_TOKEN
          valueFrom:
            secretKeyRef:
              name: influxdb-read-init
              key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
        # Org and bucket names (same for both instances)
        - name: INFLUX_ORG
          valueFrom:
            secretKeyRef:
              name: influxdb-init
              key: DOCKER_INFLUXDB_INIT_ORG
        - name: INFLUX_BUCKET
          valueFrom:
            secretKeyRef:
              name: influxdb-init
              key: DOCKER_INFLUXDB_INIT_BUCKET
