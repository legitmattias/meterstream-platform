apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  labels:
    app: nats
data:
  nats.conf: |
    # NATS Server Configuration
    port: 4222
    http_port: 8222

    # JetStream Configuration
    jetstream {
      store_dir: /data/jetstream
      max_memory_store: 256MB
      max_file_store: 1GB
    }

    # Logging
    debug: false
    trace: false
    logtime: true
