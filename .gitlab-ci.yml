      else
        IMAGE_TAG="${TAG}"
      fi
      kubectl -n meterstream set image deploy/ingestion ingestion="${IMAGE_BASE}/ingestion:${IMAGE_TAG}"

    - kubectl -n meterstream rollout status deploy/ingestion --timeout=120s
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: manual

# Processor - Processes meter data (depends on: NATS, InfluxDB)
