# Ingress - Traefik routing (frontend + API gateway)
deploy-ingress-prod:
  extends: .deploy-base-prod
  script:
    - kubectl apply -f k8s/ingress/ingress.yaml -n meterstream
    - kubectl get ingress -n meterstream
  rules:
